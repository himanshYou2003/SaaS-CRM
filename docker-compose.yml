version: "3.8"

services:
  # ── PHP-FPM Application ──────────────────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
    depends_on:
      - mongo
      - redis
    networks:
      - crm_network

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crm_network

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: crm_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: crm_user
      MONGO_INITDB_ROOT_PASSWORD: crm_secret
      MONGO_INITDB_DATABASE: crm_db
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - crm_network

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8.0-alpine
    container_name: crm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass crm_redis_secret --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - crm_network

  # ── Laravel Horizon (Queue Worker) ───────────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: crm_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - crm_network

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  crm_network:
    driver: bridge
